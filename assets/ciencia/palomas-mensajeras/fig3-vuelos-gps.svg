<svg viewBox="0 0 720 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Trayectorias de GPS: las palomas control vuelan recto a casa en día nublado; sin macrófagos vuelan errático y se pierden en día nublado, pero vuelan recto de nuevo en día soleado.">
  <style>
    text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
    .ink{fill:#37352f}.muted{fill:#787774}
    .panel{fill:#fbfbfa;stroke:#ecebe9;stroke-width:1.5}
    .ok{stroke:#2e7d5b;fill:none;stroke-width:2.5}.okf{fill:#2e7d5b}
    .fail{stroke:#c0563f;fill:none;stroke-width:2.5}.failf{fill:#c0563f}
    .dot{fill:#787774}.line{stroke:#c9c8c5;fill:none;stroke-width:1.5}
    .house{fill:none;stroke:#787774;stroke-width:1.8}
    @media (prefers-color-scheme:dark){
      .ink{fill:#e8e6e3}.muted{fill:#9b9a97}
      .panel{fill:#202020;stroke:#2d2d2d}
      .ok{stroke:#58c294}.okf{fill:#58c294}
      .fail{stroke:#d98066}.failf{fill:#d98066}
      .dot{fill:#9b9a97}.line{stroke:#3f3f3f}.house{stroke:#9b9a97}
    }
  </style>

  <!-- ===== Panel 1: control / nublado ===== -->
  <g transform="translate(20,44)">
    <text x="6" y="-6" class="ink" font-size="13" font-weight="600">Control · nublado</text>
    <rect x="0" y="4" width="206" height="168" rx="10" class="panel"/>
    <!-- cloud -->
    <g transform="translate(20,26)" class="muted">
      <ellipse cx="12" cy="8" rx="14" ry="8" fill="currentColor" opacity="0.5"/>
      <ellipse cx="26" cy="6" rx="11" ry="9" fill="currentColor" opacity="0.5"/>
    </g>
    <!-- track (straight) -->
    <path d="M30 138 L172 60" class="ok"/>
    <!-- release -->
    <circle cx="30" cy="138" r="5" class="dot"/>
    <text x="24" y="160" class="muted" font-size="10">Suelta</text>
    <!-- home -->
    <g transform="translate(160,44)">
      <path d="M0 14 L12 4 L24 14" class="house"/>
      <rect x="3" y="14" width="18" height="14" class="house"/>
    </g>
    <text x="6" y="164" class="okf" font-size="11" font-weight="600" text-anchor="start" opacity="0">.</text>
    <text x="200" y="164" class="okf" font-size="12" font-weight="700" text-anchor="end">Llega ✓</text>
  </g>

  <!-- ===== Panel 2: sin macrófagos / nublado ===== -->
  <g transform="translate(258,44)">
    <text x="6" y="-6" class="ink" font-size="13" font-weight="600">Sin macrófagos · nublado</text>
    <rect x="0" y="4" width="206" height="168" rx="10" class="panel"/>
    <g transform="translate(20,26)" class="muted">
      <ellipse cx="12" cy="8" rx="14" ry="8" fill="currentColor" opacity="0.5"/>
      <ellipse cx="26" cy="6" rx="11" ry="9" fill="currentColor" opacity="0.5"/>
    </g>
    <!-- erratic track -->
    <path d="M30 138 C60 90 40 70 78 96 S120 150 96 110 130 60 150 118 110 140 132 96" class="fail"/>
    <circle cx="30" cy="138" r="5" class="dot"/>
    <text x="24" y="160" class="muted" font-size="10">Suelta</text>
    <g transform="translate(160,44)">
      <path d="M0 14 L12 4 L24 14" class="house"/>
      <rect x="3" y="14" width="18" height="14" class="house"/>
    </g>
    <text x="200" y="164" class="failf" font-size="12" font-weight="700" text-anchor="end">Se pierde ✗</text>
  </g>

  <!-- ===== Panel 3: sin macrófagos / soleado ===== -->
  <g transform="translate(496,44)">
    <text x="6" y="-6" class="ink" font-size="13" font-weight="600">Sin macrófagos · soleado</text>
    <rect x="0" y="4" width="206" height="168" rx="10" class="panel"/>
    <!-- sun -->
    <g transform="translate(30,32)" class="muted">
      <circle cx="0" cy="0" r="8" fill="currentColor" opacity="0.55"/>
      <g stroke="currentColor" stroke-width="1.5" opacity="0.55">
        <line x1="0" y1="-13" x2="0" y2="-17"/><line x1="0" y1="13" x2="0" y2="17"/>
        <line x1="-13" y1="0" x2="-17" y2="0"/><line x1="13" y1="0" x2="17" y2="0"/>
        <line x1="-10" y1="-10" x2="-13" y2="-13"/><line x1="10" y1="10" x2="13" y2="13"/>
        <line x1="10" y1="-10" x2="13" y2="-13"/><line x1="-10" y1="10" x2="-13" y2="13"/>
      </g>
    </g>
    <path d="M30 138 L172 60" class="ok"/>
    <circle cx="30" cy="138" r="5" class="dot"/>
    <text x="24" y="160" class="muted" font-size="10">Suelta</text>
    <g transform="translate(160,44)">
      <path d="M0 14 L12 4 L24 14" class="house"/>
      <rect x="3" y="14" width="18" height="14" class="house"/>
    </g>
    <text x="200" y="164" class="okf" font-size="12" font-weight="700" text-anchor="end">Llega ✓</text>
  </g>
</svg>
