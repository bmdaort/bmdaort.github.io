title: Safari Aleatorio
description: >-
  Science, books, and personal notes.
author: Daniel
email: bmdaortiz@gmail.com

baseurl: ""
url: "https://bmdaort.github.io"

markdown: kramdown
highlighter: rouge
permalink: /:collection/:path/

collections:
  ciencia:
    output: true
    permalink: /ciencia/:path/
    label: Ciencia
    icon: "🔬"
  libros:
    output: true
    permalink: /libros/:path/
    label: Libros
    icon: "📚"
  notas:
    output: true
    permalink: /notas/:path/
    label: Notas personales
    icon: "🗒"

defaults:
  - scope:
      path: ""
      type: ciencia
    values:
      layout: post
      section: ciencia
  - scope:
      path: ""
      type: libros
    values:
      layout: post
      section: libros
  - scope:
      path: ""
      type: notas
    values:
      layout: post
      section: notas

# Sidebar order (must match collection keys above)
sections:
  - ciencia
  - libros
  - notas

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

sass:
  style: compressed

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - DOCUMENTATION.md
  - AGENTS.md
  - vendor
  - node_modules
